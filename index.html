<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Chatbot</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        #chatbox {
            height: 400px;
            border: 1px solid #ccc;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
        }

        .user-msg {
            background-color: #d1e7dd;
            text-align: right;
            margin-left: 20%;
        }

        .bot-msg {
            background-color: #e2e3e5;
            margin-right: 20%;
        }

        .bot-sql {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
            overflow-x: auto;
            margin-top: 5px;
        }

        .bot-meta {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex-grow: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0b5ed7;
        }

        button:disabled {
            background-color: #a5c8fd;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <h1>Inventory Chatbot</h1>
    <div id="chatbox"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask about your inventory..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatbox = document.getElementById('chatbox');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sessionId = "session_" + Math.random().toString(36).substring(7);

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 1. Add User Message to UI
            appendMessage('user', message);
            userInput.value = '';

            // Disable input while waiting
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                // 2. Send JSON to our FastAPI backend
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message,
                        context: {}
                    })
                });

                const data = await response.json();

                // 3. Add Bot Response to UI
                if (data.status === 'ok') {
                    appendBotMessage(data);
                } else {
                    appendMessage('bot', `<span style="color: red;">Error: ${data.natural_language_answer}</span>`);
                }
            } catch (error) {
                appendMessage('bot', `<span style="color: red;">Network Error: Failed to connect to server.</span>`);
            } finally {
                // Re-enable input
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender === 'user' ? 'user-msg' : 'bot-msg'}`;
            div.innerHTML = text;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight; // Auto-scroll
        }

        function appendBotMessage(data) {
            const div = document.createElement('div');
            div.className = 'message bot-msg';

            // Build the HTML for the bot's rich response
            let html = `<strong>Answer:</strong> ${data.natural_language_answer}`;

            if (data.sql_query) {
                html += `
                <div style="display: flex; align-items: stretch; margin-top: 10px;">
                    <div style="flex: 0 0 10%; padding: 10px 0; font-weight: bold;">SQL:</div>
                    <div class="bot-sql" style="flex: 1; margin-top: 0;">${data.sql_query}</div>
                </div>`;
            }

            html += `<div class="bot-meta">⏱️ ${data.latency_ms}ms | 🤖 ${data.model} | 🪙 ${data.token_usage.total_tokens} tokens</div>`;

            div.innerHTML = html;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>
</body>

</html>
